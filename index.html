<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fuja da Tela - Sprites</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0b1020;
    font-family: Arial;
    color: white;
  }

  canvas {
    display: block;
    background: #111827;
  }

  #hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 18px;
  }

  #gameOver {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 30px;
    display: none;
  }
</style>
</head>

<body>

<div id="hud">Pontos: 0 | Onda: 1</div>
<div id="gameOver">💀 Você perdeu</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 📏 Resize correto
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// 🎨 Imagens
const playerImg = new Image();
const wallImg = new Image();

playerImg.src = "player.png";
wallImg.src = "wall.png";

// 🔒 Garante que tudo carregou antes de começar
let loaded = 0;
function checkStart() {
  loaded++;
  if (loaded === 2) startGame();
}

playerImg.onload = checkStart;
wallImg.onload = checkStart;

// 🎮 Variáveis do jogo
let player, wall, keys, score, wave, alive;

// 🚀 Início do jogo (só depois das imagens carregarem)
function startGame() {

  player = {
    x: canvas.width / 2,
    y: canvas.height - 120,
    size: Math.min(canvas.width, canvas.height) * 0.06,
    speed: 6
  };

  wall = {
    y: -150,
    speed: 3,
    gapX: 0,
    gapW: canvas.width * 0.2,
    height: canvas.height * 0.08
  };

  keys = {};
  score = 0;
  wave = 1;
  alive = true;

  document.addEventListener("keydown", e => keys[e.key] = true);
  document.addEventListener("keyup", e => keys[e.key] = false);

  newWave();
  loop();
}

// 🧱 Nova onda
function newWave() {
  wall.y = -150;
  wall.speed += 0.3;
  wall.gapW = Math.max(120, canvas.width * 0.2 - wave * 5);
  wall.gapX = Math.random() * (canvas.width - wall.gapW);
  wave++;
}

// 🎮 Atualização
function update() {
  if (!alive) return;

  if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
  if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
  if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

  player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

  wall.y += wall.speed;

  let inGap =
    player.x + player.size > wall.gapX &&
    player.x < wall.gapX + wall.gapW;

  let hitWall =
    player.y < wall.y + wall.height &&
    player.y + player.size > wall.y;

  if (hitWall && !inGap) {
    alive = false;
    document.getElementById("gameOver").style.display = "block";
  }

  if (wall.y > canvas.height) {
    score += 2;
    newWave();
  }

  document.getElementById("hud").innerText =
    `Pontos: ${score} | Onda: ${wave}`;
}

// 🎨 Desenho
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // parede esquerda e direita
  ctx.drawImage(wallImg, 0, wall.y, wall.gapX, wall.height);
  ctx.drawImage(
    wallImg,
    wall.gapX + wall.gapW,
    wall.y,
    canvas.width - (wall.gapX + wall.gapW),
    wall.height
  );

  // player
  ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
}

// 🔁 Loop principal
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
