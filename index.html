<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fuja da Tela - Sprites</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0b1020;
    font-family: Arial;
    color: white;
  }

  canvas {
    display: block;
    margin: 0 auto;
    background: #111827;
  }

  #hud {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 18px;
  }

  #gameOver {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 30px;
    display: none;
  }
</style>
</head>
<body>

<div id="hud">Pontos: 0 | Onda: 1</div>
<div id="gameOver">💀 Você perdeu</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🎨 IMAGENS
const playerImg = new Image();
playerImg.src = "player.png";

const wallImg = new Image();
wallImg.src = "wall.png";

let player = {
  x: canvas.width / 2,
  y: canvas.height - 120,
  size: 50,
  speed: 5
};

let keys = {};
let alive = true;

let score = 0;
let wave = 1;

let wall = {
  y: -150,
  speed: 3,
  gapX: 0,
  gapW: 200,
  height: 80
};

function newWave() {
  wall.y = -150;
  wall.speed += 0.3;
  wall.gapW = Math.max(120, 240 - wave * 10);
  wall.gapX = Math.random() * (canvas.width - wall.gapW);

  wave++;
}

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update() {
  if (!alive) return;

  if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
  if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
  if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

  player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

  wall.y += wall.speed;

  let inGap =
    player.x + player.size > wall.gapX &&
    player.x < wall.gapX + wall.gapW;

  let hitWall =
    player.y < wall.y + wall.height &&
    player.y + player.size > wall.y;

  if (hitWall && !inGap) {
    alive = false;
    document.getElementById("gameOver").style.display = "block";
  }

  if (wall.y > canvas.height) {
    score += 2;
    newWave();
  }

  document.getElementById("hud").innerText =
    `Pontos: ${score} | Onda: ${wave}`;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 🧱 parede (imagem)
  ctx.drawImage(wallImg, 0, wall.y, wall.gapX, wall.height);
  ctx.drawImage(wallImg, wall.gapX + wall.gapW, wall.y,
                 canvas.width - (wall.gapX + wall.gapW), wall.height);

  // 👤 player (imagem)
  ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

newWave();
loop();
</script>

</body>
</html>
